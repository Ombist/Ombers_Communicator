# Example Nginx for docker-compose.mtls.example.yml
# Ombers listens on 127.0.0.1:18080 (phone) and 127.0.0.1:18081 (machine) in the shared netns.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name localhost;

    ssl_certificate     /etc/ssl/relay/fullchain.pem;
    ssl_certificate_key /etc/ssl/relay/privkey.pem;

    ssl_client_certificate /etc/ssl/relay/client-ca-chain.pem;
    ssl_verify_client optional;
    ssl_verify_depth 3;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 8444 ssl;
    listen [::]:8444 ssl;
    server_name localhost;

    ssl_certificate     /etc/ssl/relay/fullchain.pem;
    ssl_certificate_key /etc/ssl/relay/privkey.pem;

    ssl_client_certificate /etc/ssl/relay/client-ca-chain.pem;
    ssl_verify_client optional;
    ssl_verify_depth 3;

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
